name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    # Map secrets to env so they can be referenced in `if:` (secrets context
    # isn't allowed there directly).
    env:
      MACOS_CERT_P12: ${{ secrets.MACOS_CERT_P12 }}
      APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-13
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Install Linux GUI/clipboard dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libxdo-dev \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev libgl1-mesa-dev

      - name: Build release binaries
        run: |
          cargo build --release --target ${{ matrix.target }} -p xpress-cli
          cargo build --release --target ${{ matrix.target }} -p xpress-gui

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          dist="xpress-${GITHUB_REF_NAME}-${{ matrix.target }}"
          mkdir -p "$dist"
          bin_dir="target/${{ matrix.target }}/release"
          cp "$bin_dir/xpress" "$dist/"
          cp "$bin_dir/xpress-gui" "$dist/"
          cp README.md LICENSE NOTICE.md "$dist/"
          tar -czf "$dist.tar.gz" "$dist"
          shasum -a 256 "$dist.tar.gz" > "$dist.tar.gz.sha256"

      - name: Import signing certificate
        if: runner.os == 'macOS' && env.MACOS_CERT_P12 != ''
        env:
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          set -euo pipefail
          kc="$RUNNER_TEMP/build.keychain"
          pw="ci-$(openssl rand -hex 8)"
          echo "$MACOS_CERT_P12" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security create-keychain -p "$pw" "$kc"
          security set-keychain-settings -lut 3600 "$kc"
          security unlock-keychain -p "$pw" "$kc"
          security import "$RUNNER_TEMP/cert.p12" -k "$kc" -P "$MACOS_CERT_PASSWORD" -T /usr/bin/codesign
          security list-keychains -d user -s "$kc" $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple: -s -k "$pw" "$kc"
          rm -f "$RUNNER_TEMP/cert.p12"

      - name: Build macOS .app bundle
        if: runner.os == 'macOS'
        shell: bash
        env:
          XPRESS_SIGN_ID: ${{ secrets.MACOS_SIGN_IDENTITY }}
          XPRESS_NOTARIZE: ${{ env.APPLE_APP_PASSWORD != '' && '1' || '0' }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          bin_dir="target/${{ matrix.target }}/release"
          # Download self-contained tools (ffmpeg) to bundle inside the .app.
          scripts/fetch-static-tools.sh "${{ matrix.target }}" bundle-tools
          scripts/make-app.sh --gui "$bin_dir/xpress-gui" --bin-dir bundle-tools \
            --out dist-app --version "${GITHUB_REF_NAME#v}"
          app_zip="xpress-${GITHUB_REF_NAME}-${{ matrix.target }}-app.zip"
          ditto -c -k --keepParent dist-app/xpress.app "$app_zip"
          shasum -a 256 "$app_zip" > "$app_zip.sha256"
          dmg="xpress-${GITHUB_REF_NAME}-${{ matrix.target }}.dmg"
          scripts/make-dmg.sh --app dist-app/xpress.app --out "$dmg" --version "${GITHUB_REF_NAME#v}"
          shasum -a 256 "$dmg" > "$dmg.sha256"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            xpress-*.tar.gz
            xpress-*.tar.gz.sha256
            xpress-*-app.zip
            xpress-*-app.zip.sha256
            xpress-*.dmg
            xpress-*.dmg.sha256
          generate_release_notes: true
